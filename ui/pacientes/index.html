<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Pacientes</title>

  <style>
    body {
      margin: 0;
      padding: 32px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }

    h1 {
      margin-bottom: 16px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    input {
      padding: 8px 10px;
      width: 260px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
      border-radius: 6px;
      overflow: hidden;
    }

    thead {
      background: #f1f5f9;
      text-transform: uppercase;
      font-size: 12px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
    }

    tr:hover {
      background: #f9fafb;
    }

    .status {
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 12px;
      display: inline-block;
    }

    .ativo {
      background: #dcfce7;
      color: #166534;
    }

    .inativo {
      background: #e5e7eb;
      color: #374151;
    }

    button {
      padding: 6px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: #1f3a5f;
      color: #ffffff;
    }

    button:hover {
      background: #162c46;
    }
  </style>
</head>

<body>

  <h1>Pacientes</h1>

  <div class="toolbar">
    <input placeholder="Buscar paciente pelo nome..." />
  </div>

  <table>
    <thead>
      <tr>
        <th>Nome</th>
        <th>WhatsApp</th>
        <th>E-mail</th>
        <th>Status</th>
        <th>Última Consulta</th>
        <th>Ações</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>Aline de Jesus Mota</td>
        <td>(62) 99334-4912</td>
        <td>aline@gmail.com</td>
        <td><span class="status ativo">Em atendimento</span></td>
        <td>01/01/2026</td>
        <td><button onclick="openPatient(0)">Abrir</button></td>
      </tr>

      <tr>
        <td>Alisson Oliveira D. Ávila</td>
        <td>(79) 99915-5234</td>
        <td>alisson@gmail.com</td>
        <td><span class="status ativo">Em atendimento</span></td>
        <td>15/12/2025</td>
        <td><button onclick="openPatient(1)">Abrir</button></td>
      </tr>

      <tr>
        <td>Alex Almeida de Oliveira</td>
        <td>(34) 99660-3250</td>
        <td>alex@gmail.com</td>
        <td><span class="status inativo">Inativo</span></td>
        <td>20/09/2025</td>
        <td><button onclick="openPatient(2)">Abrir</button></td>
      </tr>
    </tbody>
  </table>

  <script>
    function openPatient(index) {
      window.parent.postMessage({
        type: "SELECT_PATIENT",
        payload: index
      }, "*");
    }
  </script>

</body>
</html>
