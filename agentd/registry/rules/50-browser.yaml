## Browser automation rules
## Schema: rules wrapper + predicates/match/priority (kernel-compatible)
## Decisions válidas: allow | review | block | forbidden
rules:
  # Leitura passiva — sempre permitida em estados ativos
  - id: "browser-read-safe"
    description: "Screenshot e get_content são operações de leitura passiva"
    priority: 50
    decision: "allow"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "in"
        value: ["browser.screenshot", "browser.get_content"]
      - field: "ctx.fsm_state"
        op: "in"
        value: ["EXECUTING", "TESTING", "DIAGNOSIS", "PLANNING"]

  # Fechar browser — sempre permitido
  - id: "browser-close-safe"
    description: "Fechar browser não tem efeitos colaterais"
    priority: 50
    decision: "allow"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "eq"
        value: "browser.close"

  # Navegação e interação ativa — permitida apenas em EXECUTING
  - id: "browser-active-executing"
    description: "Navegação, cliques e digitação permitidos apenas durante execução"
    priority: 51
    decision: "allow"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "in"
        value: ["browser.open", "browser.click", "browser.type"]
      - field: "ctx.fsm_state"
        op: "eq"
        value: "EXECUTING"

  # Bloquear browser.eval — execução arbitrária de JS nunca permitida
  - id: "browser-eval-forbidden"
    description: "Execução de JavaScript arbitrário via browser é proibida"
    priority: 2
    decision: "forbidden"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "eq"
        value: "browser.eval"
