## Default Deny + base rules
rules:
  # Forbidden: nunca executar — prioridade máxima
  - id: "deny-forbidden-tools"
    description: "Tools com risk_level forbidden são proibidas sem exceção"
    priority: 1
    decision: "forbidden"
    match: "all"
    predicates:
      - field: "tool.risk_level"
        op: "eq"
        value: "forbidden"

  # Allow: tools safe sempre executam — mesmo em IDLE (leitura, list, search, audit)
  # Prioridade 4 garante que passa ANTES do block-idle (prio 5)
  - id: "allow-safe-tools-always"
    description: "Tools marcadas como safe executam sem restrição de estado FSM"
    priority: 4
    decision: "allow"
    match: "all"
    predicates:
      - field: "tool.risk_level"
        op: "eq"
        value: "safe"

  # Block: não executar tools moderate/high/critical durante IDLE
  # (safe tools já foram tratadas acima e não chegam aqui)
  - id: "block-idle-execution"
    description: "Bloqueia execução de tools com efeitos colaterais quando FSM está em IDLE"
    priority: 5
    decision: "block"
    match: "all"
    predicates:
      - field: "ctx.fsm_state"
        op: "eq"
        value: "IDLE"

  # Review: qualquer tool com risk_level high ou critical exige HITL
  - id: "review-high-risk"
    description: "Tools de alto risco exigem aprovação humana (HITL)"
    priority: 10
    decision: "review"
    match: "any"
    predicates:
      - field: "tool.risk_level"
        op: "eq"
        value: "high"
      - field: "tool.risk_level"
        op: "eq"
        value: "critical"
