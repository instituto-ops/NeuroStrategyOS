## Default Deny + base rules
rules:
  # Forbidden: nunca executar - prioridade maxima.
  - id: "deny-forbidden-tools"
    description: "Tools com risk_level forbidden sao proibidas sem excecao"
    priority: 1
    decision: "forbidden"
    match: "all"
    predicates:
      - field: "tool.risk_level"
        op: "eq"
        value: "forbidden"

  # Review: high/critical sempre entram em HITL antes do bloqueio generico de IDLE.
  - id: "review-high-risk"
    description: "Tools de alto risco exigem aprovacao humana (HITL)"
    priority: 3
    decision: "review"
    match: "any"
    predicates:
      - field: "tool.risk_level"
        op: "eq"
        value: "high"
      - field: "tool.risk_level"
        op: "eq"
        value: "critical"

  # Allow: tools safe sempre executam, mesmo em IDLE.
  - id: "allow-safe-tools-always"
    description: "Tools marcadas como safe executam sem restricao de estado FSM"
    priority: 4
    decision: "allow"
    match: "all"
    predicates:
      - field: "tool.risk_level"
        op: "eq"
        value: "safe"

  # Block: nao executar tools moderate durante IDLE.
  # High/critical ja foram tratadas por HITL acima.
  - id: "block-idle-execution"
    description: "Bloqueia execucao de tools com efeitos colaterais quando FSM esta em IDLE"
    priority: 5
    decision: "block"
    match: "all"
    predicates:
      - field: "ctx.fsm_state"
        op: "eq"
        value: "IDLE"
