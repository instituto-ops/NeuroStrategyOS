## Filesystem rules
rules:
  # Allow: leitura de arquivos é segura
  - id: "allow-filesystem-read"
    description: "Leitura de arquivos é sempre permitida durante execução"
    priority: 20
    decision: "allow"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "eq"
        value: "filesystem.read_file"
      - field: "ctx.fsm_state"
        op: "in"
        value: ["EXECUTING", "TESTING", "DIAGNOSIS", "PLANNING"]

  # Allow: escrita de arquivos com risk moderate
  - id: "allow-filesystem-write"
    description: "Escrita de arquivos permitida durante execução"
    priority: 25
    decision: "allow"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "eq"
        value: "filesystem.write_file"
      - field: "ctx.fsm_state"
        op: "in"
        value: ["EXECUTING"]

  # Block: escrita em paths protegidos
  - id: "block-write-system-paths"
    description: "Bloqueia escrita em diretórios do sistema"
    priority: 15
    decision: "forbidden"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "eq"
        value: "filesystem.write_file"
      - field: "args.path"
        op: "matches"
        value: "^(C:\\\\Windows|/etc|/usr|/sys|/proc)"

  # Allow: list_dir e search são safe
  # (Nota: safe tools já são cobertas por allow-safe-tools-always em 00-defaults.yaml)
  # Esta regra é redundante mas explícita para documentação
  - id: "allow-filesystem-list-search"
    description: "List e search de arquivos permitidos durante estados ativos"
    priority: 20
    decision: "allow"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "in"
        value: ["filesystem.list_dir", "filesystem.search"]
      - field: "ctx.fsm_state"
        op: "in"
        value: ["EXECUTING", "TESTING", "DIAGNOSIS", "PLANNING"]

  # Allow: patch_file durante execução (moderate, mas reversível — backup obrigatório)
  - id: "allow-filesystem-patch"
    description: "Patch de arquivo permitido durante execução (com backup automático)"
    priority: 25
    decision: "allow"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "eq"
        value: "filesystem.patch_file"
      - field: "ctx.fsm_state"
        op: "eq"
        value: "EXECUTING"

  # Bloquear patch em paths do sistema
  - id: "block-patch-system-paths"
    description: "Bloqueia patch em diretórios do sistema operacional"
    priority: 15
    decision: "forbidden"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "eq"
        value: "filesystem.patch_file"
      - field: "args.path"
        op: "matches"
        value: "^(C:\\\\Windows|/etc|/usr|/sys|/proc)"
