## Vórtex domain rules
## Schema: rules wrapper + predicates/match/priority (kernel-compatible)
rules:
  # Leitura de estado do CMS — sempre permitida (safe tools)
  - id: "vortex-read-safe"
    description: "Leitura de drafts, publicados e mídia é sempre permitida"
    priority: 40
    decision: "allow"
    match: "any"
    predicates:
      - field: "tool.id"
        op: "in"
        value: ["vortex.list_drafts", "vortex.list_published", "vortex.list_media"]

  # Auditoria de conteúdo — sempre permitida
  - id: "vortex-audit-safe"
    description: "Auditoria de rascunhos é operação safe"
    priority: 40
    decision: "allow"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "eq"
        value: "vortex.audit"

  # Edição em rascunhos — permitida durante execução/planejamento
  - id: "vortex-edit-executing"
    description: "Geração, save_draft e micro_edit permitidos em EXECUTING ou PLANNING"
    priority: 41
    decision: "allow"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "in"
        value: ["vortex.generate", "vortex.save_draft", "vortex.micro_edit"]
      - field: "ctx.fsm_state"
        op: "in"
        value: ["EXECUTING", "PLANNING"]

  # Publicação — HITL obrigatório (ação irreversível: commit GitHub)
  - id: "vortex-publish-hitl"
    description: "Publicação em produção exige aprovação humana (HITL)"
    priority: 39
    decision: "review"
    match: "any"
    predicates:
      - field: "tool.id"
        op: "eq"
        value: "vortex.publish"
