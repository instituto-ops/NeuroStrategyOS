## Git tool-level rules (read ops are safe, writes need context)
rules:
  - id: "allow-git-safe-ops"
    description: "Git read operations (status, diff, log, branch) são seguras"
    priority: 20
    decision: "allow"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "in"
        value: ["git.status", "git.diff", "git.log", "git.branch"]
      - field: "ctx.fsm_state"
        op: "in"
        value: ["EXECUTING", "TESTING", "DIAGNOSIS", "PLANNING"]

  - id: "allow-git-add"
    description: "Git add é seguro durante execução"
    priority: 22
    decision: "allow"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "eq"
        value: "git.add"
      - field: "ctx.fsm_state"
        op: "eq"
        value: "EXECUTING"

  - id: "allow-git-commit"
    description: "Git commit permitido durante execução"
    priority: 22
    decision: "allow"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "eq"
        value: "git.commit"
      - field: "ctx.fsm_state"
        op: "eq"
        value: "EXECUTING"

  - id: "review-git-checkout"
    description: "Git checkout exige review"
    priority: 22
    decision: "review"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "eq"
        value: "git.checkout"
