## Git tool-level rules (read ops are safe, writes need context)
rules:
  - id: "allow-git-safe-ops"
    description: "Git read operations (status, diff, log, branch) são seguras"
    priority: 20
    decision: "allow"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "in"
        value: ["git.status", "git.diff", "git.log", "git.branch"]
      - field: "ctx.fsm_state"
        op: "in"
        value: ["EXECUTING", "TESTING", "DIAGNOSIS", "PLANNING"]

  - id: "allow-git-add"
    description: "Git add é seguro durante execução"
    priority: 22
    decision: "allow"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "eq"
        value: "git.add"
      - field: "ctx.fsm_state"
        op: "eq"
        value: "EXECUTING"

  - id: "allow-git-commit"
    description: "Git commit permitido durante execução"
    priority: 22
    decision: "allow"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "eq"
        value: "git.commit"
      - field: "ctx.fsm_state"
        op: "eq"
        value: "EXECUTING"

  - id: "review-git-checkout"
    description: "Git checkout exige review"
    priority: 22
    decision: "review"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "eq"
        value: "git.checkout"

  - id: "allow-git-branch"
    description: "Git branch (listagem) é operação safe"
    priority: 20
    decision: "allow"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "eq"
        value: "git.branch"

  # git.push — HITL obrigatório (irreversível)
  - id: "review-git-push"
    description: "Git push exige aprovação humana — ação irreversível"
    priority: 23
    decision: "review"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "eq"
        value: "git.push"
      - field: "ctx.fsm_state"
        op: "in"
        value: ["EXECUTING"]

  # Force push — nunca permitido
  - id: "forbidden-git-force-push"
    description: "Force push é proibido sem exceção"
    priority: 2
    decision: "forbidden"
    match: "all"
    predicates:
      - field: "tool.id"
        op: "eq"
        value: "git.push"
      - field: "args.force"
        op: "eq"
        value: "true"
