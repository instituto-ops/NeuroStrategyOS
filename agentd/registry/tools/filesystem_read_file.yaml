id: "filesystem.read_file"
version: "1.0.0"
description: "Reads the content of a file from the local filesystem."
risk_level: "safe"
reversible: true
requires_approval: false
sandbox: false
timeout_ms: 5000
input_schema:
  type: "object"
  properties:
    path:
      type: "string"
      description: "Absolute path to the file to read."
  required: ["path"]
applicable_skills: ["*"]
examples:
  - input:
      path: "/absolute/path/to/file.txt"
    explanation: "Reads the entire content of file.txt"
